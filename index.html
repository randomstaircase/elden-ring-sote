<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elden Ring Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── THEMES ── */
:root {
  --bg0:#06090e;--bg1:#080d16;--bg2:#0b1220;--bg3:#0f172c;--bg4:#141e36;
  --acc:#9ab0e0;--acc2:#c4a8f8;--acc3:#4a6aaa;
  --text:#ccdaf5;--text2:#8898c8;--text3:#6070a8;
  --border:rgba(154,176,224,0.12);--border2:rgba(154,176,224,0.07);
  --felled:#1e4a2e;--felled-text:#5ab870;--felled-border:rgba(90,184,112,0.25);
  --sote-acc:#b82818;--sote-acc2:#c86820;--sote-border:rgba(184,40,24,0.2);
  --sote-bg:#110808;--sote-text:#d8b0a0;--sote-text2:#7a4030;
  --top-h:52px;
}
.t-elden {
  --bg0:#060a06;--bg1:#09110a;--bg2:#0c180e;--bg3:#101e12;--bg4:#152616;
  --acc:#c0981e;--acc2:#78b838;--acc3:#7a6010;
  --text:#e0cc88;--text2:#90a860;--text3:#607848;
  --border:rgba(192,152,30,0.12);--border2:rgba(192,152,30,0.07);
  --felled:#1a4818;--felled-text:#70b850;
}
.t-sote {
  --bg0:#0e0606;--bg1:#140909;--bg2:#1a0e0e;--bg3:#201212;--bg4:#281818;
  --acc:#b82818;--acc2:#c86820;--acc3:#7a1a10;
  --text:#d8b0a0;--text2:#a06848;--text3:#784030;
  --border:rgba(184,40,24,0.15);--border2:rgba(184,40,24,0.08);
  --felled:#1e4a2e;--felled-text:#5ab870;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Crimson Pro',Georgia,serif;
  background:var(--bg0);color:var(--text);
  min-height:100vh;
}

/* ── STAR BG ── */
#stars{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 7% 11%,rgba(154,176,224,.55) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 19% 5%,rgba(196,168,248,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 34% 16%,rgba(154,176,224,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 53% 3%,rgba(154,176,224,.3) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 68% 13%,rgba(196,168,248,.38) 0%,transparent 100%),
    radial-gradient(1px 1px at 82% 8%,rgba(154,176,224,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 93% 20%,rgba(154,176,224,.3) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 44% 26%,rgba(196,168,248,.28) 0%,transparent 100%),
    radial-gradient(1px 1px at 76% 31%,rgba(154,176,224,.22) 0%,transparent 100%),
    radial-gradient(1px 1px at 14% 48%,rgba(196,168,248,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 59% 55%,rgba(154,176,224,.15) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 30% 62%,rgba(154,176,224,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 86% 67%,rgba(196,168,248,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 48% 78%,rgba(154,176,224,.15) 0%,transparent 100%),
    radial-gradient(1px 1px at 72% 85%,rgba(196,168,248,.14) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 91%,rgba(154,176,224,.16) 0%,transparent 100%);
}
.t-elden #stars,.t-sote #stars{display:none;}

/* ── TOPBAR (sticky) ── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(6,9,14,.96);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;padding:0 16px;
  min-height:var(--top-h);
  flex-wrap:wrap;
  backdrop-filter:blur(10px);
}
.t-elden #topbar{background:rgba(6,10,6,.97);}
.t-sote #topbar{background:rgba(14,6,6,.97);}

.logo{
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;
  letter-spacing:.14em;color:var(--acc);white-space:nowrap;flex-shrink:0;
}
.logo em{
  font-style:normal;font-size:8px;font-weight:400;
  color:var(--acc2);margin-left:5px;letter-spacing:.06em;opacity:.75;vertical-align:middle;
}
.tb-gap{flex:1;}
.tb-gap-mobile{display:none;}

/* Theme toggle */
.theme-tog{
  display:flex;background:var(--bg3);
  border:1px solid var(--border);border-radius:18px;padding:3px;gap:2px;flex-shrink:0;
}
.t-btn{
  padding:3px 10px;border-radius:14px;border:none;
  background:transparent;color:var(--text2);
  font-family:'Crimson Pro',serif;font-size:11px;cursor:pointer;
  letter-spacing:.04em;transition:all .18s;white-space:nowrap;
}
.t-btn.on{background:var(--acc);color:var(--bg0);font-weight:600;}

/* Character + Journey selectors */
.pt-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.pt-sep{color:var(--text3);font-size:11px;opacity:.6;}
.sel{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:'Crimson Pro',serif;font-size:12px;
  padding:4px 8px;border-radius:6px;cursor:pointer;outline:none;
  max-width:130px;
}
.sel option{background:#0b1220;}
.icon-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--acc);font-family:'Cinzel',serif;font-size:8px;
  letter-spacing:.1em;padding:5px 9px;border-radius:6px;cursor:pointer;
  transition:all .18s;white-space:nowrap;flex-shrink:0;
}
.icon-btn:hover{background:var(--acc);color:var(--bg0);}
.icon-btn.dim{color:var(--text2);border-color:var(--border2);}
.csv-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--acc);font-family:'Cinzel',serif;font-size:8px;
  letter-spacing:.1em;padding:5px 9px;border-radius:6px;cursor:pointer;
  transition:all .18s;flex-shrink:0;
}
.csv-btn:hover{background:var(--acc);color:var(--bg0);}

/* ── CONTENT SHELL ── */
#shell{
  position:relative;z-index:1;
  max-width:1360px;margin:0 auto;
  padding-left:18px;padding-right:18px;
  padding-top:52px;
}

/* ── SUB NAV TABS ── */
#subnav{
  position:fixed;top:52px;left:0;right:0;z-index:100;
  background:var(--bg0);border-bottom:1px solid var(--border);
  display:flex;flex-wrap:wrap;gap:6px;
  padding:8px 18px;
  scrollbar-width:none;
}
#subnav::-webkit-scrollbar{display:none;}
.t-elden #subnav{background:var(--bg0);}
.t-sote #subnav{background:var(--bg0);}

/* all nav items are pills now */
.snav{display:none;}
.snav-pill{
  display:inline-flex;align-items:center;
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:.08em;
  padding:5px 13px;
  border:0.5px solid var(--border);border-radius:14px;
  background:transparent;color:var(--text2);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.snav-pill:hover{color:var(--text);border-color:var(--acc);}
.snav-pill.on{background:var(--acc);color:var(--bg0);border-color:var(--acc);}
.snav-pill.sote-pill{color:var(--sote-text2);border-color:var(--sote-border);}
.snav-pill.sote-pill.on{background:var(--sote-acc);color:#fff0ee;border-color:var(--sote-acc);}
.tab-pane{display:none;padding-top:18px;padding-bottom:60px;}
.tab-pane.on{display:block;}

/* ── MODAL ── */
#modal-wrap{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:500;display:none;align-items:center;justify-content:center;
}
#modal-wrap.open{display:flex;}
.modal{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:22px 24px;width:360px;max-width:92vw;
}
.modal h3{
  font-family:'Cinzel',serif;font-size:12px;letter-spacing:.12em;
  color:var(--acc);margin-bottom:6px;
}
.modal p{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.55;font-style:italic;}
.modal input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:'Crimson Pro',serif;font-size:14px;
  padding:8px 11px;border-radius:6px;outline:none;margin-bottom:14px;
}
.modal input:focus{border-color:var(--acc);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.mbtn{
  padding:7px 16px;border-radius:6px;font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:.1em;cursor:pointer;border:1px solid var(--border);
  transition:all .15s;background:transparent;color:var(--text2);
}
.mbtn.ok{background:var(--acc);color:var(--bg0);border-color:var(--acc);}
.mbtn:hover{opacity:.82;}

/* ── DASHBOARD ── */
.dash-sec{margin-bottom:22px;}
.dash-sec-title{
  font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:.22em;
  color:var(--text2);margin-bottom:10px;padding-bottom:5px;
  border-bottom:1px solid var(--border2);
}
.stat-grid{display:grid;gap:8px;}
.sg-2{grid-template-columns:repeat(2,1fr);}
.sg-3{grid-template-columns:repeat(3,1fr);}
.sg-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:860px){.sg-4{grid-template-columns:repeat(2,1fr);}.sg-3{grid-template-columns:repeat(3,1fr);}}
@media(max-width:560px){.sg-3{grid-template-columns:repeat(2,1fr);}.sg-2{grid-template-columns:1fr 1fr;}}

.sc{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;
}
.sc::before{
  content:'';position:absolute;top:0;left:0;width:2px;height:100%;
  background:var(--acc);
}
.sc.acc-sote::before{background:var(--sote-acc);}
.sc.acc-death::before{background:#7a2020;}
.sc.acc-spell::before{background:var(--acc2);}
.sc-lbl{
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:.18em;
  color:var(--text2);margin-bottom:4px;
}
.sc-num{
  font-family:'Cinzel',serif;font-size:21px;font-weight:700;
  color:var(--acc);line-height:1;
}
.sc.acc-sote .sc-num{color:var(--sote-acc);}
.sc.acc-death .sc-num{color:#d07070;}
.sc.acc-spell .sc-num{color:var(--acc2);}
.sc-line{display:flex;gap:6px;align-items:baseline;margin-top:3px;}
.sc-ll{font-size:9.5px;color:var(--text2);font-style:italic;min-width:52px;}
.sc-lv{font-size:11.5px;color:var(--text);}
.sc-lv.g{color:var(--felled-text);}
.sc-lv.r{color:#d07070;}
.prog{height:3px;background:var(--bg4);border-radius:2px;margin-top:8px;overflow:hidden;}
.prog-f{height:100%;border-radius:2px;background:var(--acc);transition:width .4s;}
.sc.acc-sote .prog-f{background:var(--sote-acc);}
.sc.acc-spell .prog-f{background:var(--acc2);}

/* leaderboard */
.ldr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
@media(max-width:620px){.ldr-grid{grid-template-columns:1fr;}}
.ldr{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ldr-hdr{
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:.15em;
  color:var(--text2);padding:8px 12px 6px;border-bottom:1px solid var(--border2);
}
.ldr-row{display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid var(--border2);}
.ldr-row:last-child{border-bottom:none;}
.ldr-n{font-size:9px;font-family:'Cinzel',serif;color:var(--text2);width:14px;flex-shrink:0;}
.ldr-name{flex:1;font-size:11.5px;color:var(--text);line-height:1.2;}
.ldr-d{font-family:'Cinzel',serif;font-size:13px;color:#d07070;flex-shrink:0;}
.ldr-bar{height:2px;background:var(--bg4);border-radius:1px;margin-top:1px;}
.ldr-bar-f{height:100%;background:#6a1818;border-radius:1px;}
.ldr-empty{padding:10px 12px;font-size:11px;color:var(--text3);font-style:italic;}

/* ── REGION BLOCKS ── */
.region-block{
  background:var(--bg1);border:1px solid var(--border2);
  border-radius:10px;margin-bottom:10px;overflow:hidden;
}
.region-block.sote{background:var(--sote-bg);border-color:var(--sote-border);}
.r-prog-bar{height:3px;background:var(--bg4);}
.r-prog-fill{height:100%;background:var(--acc);transition:width .3s;}
.sote .r-prog-fill{background:var(--sote-acc);}
.r-hdr{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  cursor:pointer;user-select:none;transition:background .12s;
}
.r-hdr:hover{background:rgba(154,176,224,.025);}
.sote .r-hdr:hover{background:rgba(184,40,24,.025);}
.r-title{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:.13em;
  color:var(--acc);flex:1;
}
.sote .r-title{color:var(--sote-acc);}
.r-meta{font-size:10.5px;color:var(--text2);font-style:italic;}
.r-chev{color:var(--text2);font-size:9px;transition:transform .2s;}
.region-block.col .r-chev{transform:rotate(-90deg);}
.region-block.col .r-body{display:none;}

/* ── BOSS TABLE ── */
.boss-tbl{width:100%;border-collapse:collapse;}
.boss-tbl th{
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:.12em;
  color:var(--text2);padding:7px 14px 5px;text-align:left;
  border-bottom:1px solid var(--border2);
}
.boss-tbl td{padding:5px 14px;border-bottom:1px solid var(--border2);vertical-align:middle;}
.boss-tbl tr:last-child td{border-bottom:none;}
.boss-tbl tr:hover td{background:rgba(154,176,224,.02);}
.sote .boss-tbl tr:hover td{background:rgba(184,40,24,.02);}
.boss-tbl tr.killed-row td{background:rgba(30,74,46,.18);}
.b-nm{font-size:12px;color:var(--text);}
.b-nm.k{color:var(--felled-text);}
.sote .b-nm{color:var(--sote-text);}
.ck{
  width:19px;height:19px;border:1px solid var(--border);border-radius:4px;
  background:transparent;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:11px;color:transparent;transition:all .14s;flex-shrink:0;
}
.ck.on{background:var(--felled);border-color:var(--felled-border);color:var(--felled-text);}
.sote .ck.on{background:var(--sote-acc);border-color:var(--sote-acc);color:#ffe8e0;}
.d-inp{
  width:48px;background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-family:'Crimson Pro',serif;font-size:12px;
  padding:2px 5px;border-radius:4px;text-align:center;outline:none;
}
.d-inp:focus{border-color:var(--acc);}
.sote .d-inp:focus{border-color:var(--sote-acc);}
.d-inp.hot{color:#d07070;}

/* ── ITEM SECTION (styled table rows, Style C) ── */
.item-section{
  background:var(--bg1);border:1px solid var(--border2);
  border-radius:10px;margin-bottom:10px;overflow:hidden;
}
.cat-hdr{
  background:var(--bg2);
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px 6px;border-bottom:1px solid var(--border2);
  cursor:pointer;user-select:none;
}
.cat-title{
  font-family:'Cinzel',serif;font-size:8px;letter-spacing:.18em;color:var(--acc);
}
.cat-right{display:flex;align-items:center;gap:10px;}
.cat-cnt{font-size:10px;color:var(--text2);font-style:italic;}
.cat-chev{color:var(--text2);font-size:9px;transition:transform .18s;}
.cat-collapsed .cat-chev{transform:rotate(-90deg);}
.cat-collapsed .cat-rows{display:none;}

.item-row{
  display:flex;align-items:center;gap:10px;padding:6px 14px;
  border-bottom:1px solid var(--border2);transition:background .12s;cursor:pointer;
}
.item-row:last-child{border-bottom:none;}
.item-row:hover{background:rgba(154,176,224,.025);}
.item-row.got{background:rgba(30,74,46,.12);}
.ick{
  width:17px;height:17px;border:1px solid var(--border);border-radius:3px;
  background:transparent;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:transparent;transition:all .14s;flex-shrink:0;
}
.ick.on{background:var(--felled);border-color:var(--felled-border);color:var(--felled-text);}
.i-name{
  flex:1;font-size:12px;color:var(--text);
  display:flex;align-items:center;gap:5px;
}
.item-row.got .i-name{color:var(--felled-text);}
.dlc{
  display:inline-flex;align-items:center;
  background:rgba(184,40,24,.16);color:#c05030;
  font-family:'Cinzel',serif;font-size:6.5px;letter-spacing:.08em;
  padding:1px 5px;border-radius:3px;border:1px solid rgba(184,40,24,.28);
  flex-shrink:0;
}
.i-loc{font-size:10.5px;color:var(--text2);font-style:italic;text-align:right;max-width:280px;}

/* collapse-all toolbar */
.sec-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.sec-toolbar-title{
  font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:.2em;color:var(--text2);
}
.tog-all-btn{
  background:transparent;border:1px solid var(--border);color:var(--text2);
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;
  padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .15s;
}
.tog-all-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--acc);}

/* search */
.search-bar{
  width:100%;background:var(--bg2);border:1px solid var(--border);
  color:var(--text);font-family:'Crimson Pro',serif;font-size:13px;
  padding:8px 12px;border-radius:8px;outline:none;margin-bottom:12px;
}
.search-bar:focus{border-color:var(--acc);}
.search-bar::placeholder{color:var(--text3);}

/* ── responsive: compress on smaller screens ── */
@media(max-width:900px){
  #topbar{padding:0 12px;gap:7px;}
  .logo{font-size:11px;letter-spacing:.1em;}
  .logo em{display:none;}
  .t-btn{padding:3px 7px;font-size:10px;}
  .sel{font-size:11px;padding:3px 6px;max-width:110px;}
  .icon-btn{padding:4px 7px;font-size:7.5px;}
  .csv-btn{padding:4px 8px;font-size:7.5px;}
  #shell{padding-left:12px;padding-right:12px;}
  #subnav{padding:8px 12px;}
}
@media(max-width:600px){
  #topbar{padding:0 8px;gap:4px;}
  .logo{font-size:10px;letter-spacing:.06em;}
  .theme-tog{padding:2px;gap:1px;}
  .t-btn{padding:2px 5px;font-size:9px;}
  .pt-wrap{gap:3px;}
  .sel{font-size:10px;padding:2px 4px;max-width:82px;}
  .icon-btn{padding:3px 5px;font-size:7px;}
  .csv-btn{padding:3px 6px;font-size:7px;}
  #shell{padding-left:8px;padding-right:8px;}
  #subnav{padding:7px 8px;}
}
@media(max-width:480px){
  #topbar{padding:6px 10px;gap:5px;align-items:center;}
  .logo{font-size:11px;letter-spacing:.1em;flex-shrink:0;order:1;}
  .logo em{display:none;}
  .tb-gap{flex:1;order:2;}
  .csv-btn{order:3;flex-shrink:0;padding:4px 8px;font-size:7.5px;}
  .theme-tog{order:4;flex:1;min-width:0;border-radius:14px;padding:2px;gap:1px;}
  .t-btn{flex:1;text-align:center;padding:4px 3px;font-size:9px;letter-spacing:.01em;}
  .pt-wrap{order:5;flex-shrink:0;gap:4px;}
  .sel{font-size:11px;padding:3px 5px;max-width:90px;}
  .icon-btn{padding:3px 5px;font-size:7px;}
  #shell{padding-left:10px;padding-right:10px;}
  #subnav{padding:6px 10px;}
}
</style>
</head>
<body>
<div id="stars"></div>

<!-- MODAL -->
<div id="modal-wrap">
  <div class="modal" id="modal-box">
    <h3 id="modal-title">NEW CHARACTER</h3>
    <p id="modal-desc">Give your character a name. Each character tracks progress independently across all journeys (NG through NG+7).</p>
    <input type="text" id="modal-inp" placeholder="Character name..." maxlength="28">
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal()">Cancel</button>
      <button class="mbtn ok" id="modal-ok" onclick="confirmModal()">Create</button>
    </div>
  </div>
</div>

<div id="topbar">
  <div class="logo">ELDEN RING<em>TRACKER</em></div>
  <div class="tb-gap"></div>
  <div class="tb-gap-mobile"></div>

  <!-- Theme -->
  <div class="theme-tog">

/* ════════════════════════════════════════════════════
   PLAYTHROUGH STATE
   Structure: characters[] stored in localStorage
   Active: currentChar, currentJourney
   State key: er4_{charName}_{journey}
════════════════════════════════════════════════════ */
const JOURNEYS = ['NG','NG+1','NG+2','NG+3','NG+4','NG+5','NG+6','NG+7'];
let chars = [];
let currentChar = '';
let currentJourney = 'NG';
let state = null;

function stateKey(c, j) { return 'er4_' + c.replace(/\W/g,'_') + '_' + j.replace('+','p'); }
function metaKey() { return 'er4_meta'; }

function loadMeta() {
  try {
    const m = JSON.parse(localStorage.getItem(metaKey()) || 'null');
    if (m) { chars = m.chars || []; currentChar = m.lastChar || ''; currentJourney = m.lastJourney || 'NG'; }
  } catch(e) {}
  if (!chars.length) { chars = ['Tarnished']; currentChar = 'Tarnished'; }
  if (!currentChar || !chars.includes(currentChar)) currentChar = chars[0];
}

function saveMeta() {
  localStorage.setItem(metaKey(), JSON.stringify({ chars, lastChar: currentChar, lastJourney: currentJourney }));
}

function loadState() {
  try {
    const s = localStorage.getItem(stateKey(currentChar, currentJourney));
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}

function saveState() {
  localStorage.setItem(stateKey(currentChar, currentJourney), JSON.stringify(state));
}

function freshState() {
  return {
    bosses: Object.fromEntries(Object.entries(RAW.bosses).map(([r,bs]) => [r, bs.map(b => ({name:b.name, killed:false, attempts:0}))])),
    sote_bosses: Object.fromEntries(Object.entries(RAW.sote_bosses).map(([r,bs]) => [r, bs.map(b => ({name:b.name, killed:false, attempts:0}))])),
    weapons: Object.fromEntries(Object.entries(RAW.weapons).map(([c,ws]) => [c, ws.map(w => ({name:w.name, location:w.location, collected:false}))])),
    sorceries: RAW.sorceries.map(s => ({name:s.name, location:s.location, collected:false})),
    incantations: RAW.incantations.map(s => ({name:s.name, location:s.location, collected:false})),
    spirit_ashes: RAW.spirit_ashes.map(s => ({name:s.name, location:s.location, collected:false})),
    talismans: RAW.talismans.map(t => ({name:t.name, effect:t.effect, location:t.location, collected:false})),
  };
}

function switchTo(char, journey) {
  saveState();
  currentChar = char;
  currentJourney = journey;
  saveMeta();
  // Always start fresh if no saved data exists for this exact char+journey combo
  const saved = loadState();
  state = saved ? saved : freshState();
  buildSelectors();
  renderAll();
}

function onCharChange(c) {
  // Switching character resets journey to NG and always loads that char's NG state (fresh if none)
  saveState();
  currentChar = c;
  currentJourney = 'NG';
  saveMeta();
  const saved = loadState();
  state = saved ? saved : freshState();
  buildSelectors();
  renderAll();
}

function onJourneyChange(j) {
  saveState();
  currentJourney = j;
  saveMeta();
  // Each journey for this character is independent — fresh if never played
  const saved = loadState();
  state = saved ? saved : freshState();
  buildSelectors();
  renderAll();
}

function buildSelectors() {
  const cs = document.getElementById('char-sel');
  cs.innerHTML = chars.map(c => `<option value="${c}" ${c===currentChar?'selected':''}>${c}</option>`).join('');
  const js = document.getElementById('journey-sel');
  js.innerHTML = JOURNEYS.map(j => `<option value="${j}" ${j===currentJourney?'selected':''}>${j}</option>`).join('');
}

/* ── CHARACTER MODAL ── */
let modalMode = 'char';
function openNewChar() {
  modalMode = 'char';
  document.getElementById('modal-title').textContent = 'NEW CHARACTER';
  document.getElementById('modal-desc').textContent = 'Give your character a name. Each character tracks all journeys (NG – NG+7) independently with a fresh slate.';
  document.getElementById('modal-ok').textContent = 'Create';
  document.getElementById('modal-inp').value = '';
  document.getElementById('modal-wrap').classList.add('open');
  setTimeout(() => document.getElementById('modal-inp').focus(), 60);
}
function closeModal() { document.getElementById('modal-wrap').classList.remove('open'); }
function confirmModal() {
  const name = document.getElementById('modal-inp').value.trim();
  if (!name) return;
  if (chars.includes(name)) { alert('A character with that name already exists.'); return; }
  // Wipe any stale keys that might exist for this name
  JOURNEYS.forEach(j => localStorage.removeItem(stateKey(name, j)));
  chars.push(name);
  saveState(); // save current char's state first
  currentChar = name;
  currentJourney = 'NG';
  state = freshState();
  saveMeta();
  saveState(); // persist blank state for new char NG
  buildSelectors();
  renderAll();
  closeModal();
}
document.getElementById('modal-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmModal();
  if (e.key === 'Escape') closeModal();
});
document.getElementById('modal-wrap').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-wrap')) closeModal();
});

/* ── HELPERS ── */
function pct(a, b) { return b ? Math.round(a / b * 100) : 0; }
function clean(n) { return n.replace(/[\u{1F300}-\u{1FFFF}\u{2600}-\u{27FF}\u{1F000}-\u{1F02F}]/gu, '').trim(); }
function bStats(map) {
  let total=0,killed=0,deaths=0;
  for (const bs of Object.values(map)) {
    total += bs.length;
    killed += bs.filter(b => b.killed).length;
    deaths += bs.reduce((s,b) => s + (b.attempts||0), 0);
  }
  return {total, killed, deaths};
}
function iStats(arr) { return {total:arr.length, got:arr.filter(x=>x.collected||x.killed).length}; }
function mStats(map) { let t=0,g=0; for(const v of Object.values(map)){t+=v.length;g+=v.filter(x=>x.collected).length;} return{total:t,got:g}; }

/* ── BOSS REGIONS ── */
function renderBosses(filter) {
  const q = (filter||'').toLowerCase();
  const el = document.getElementById('boss-body');
  el.innerHTML = '';
  for (const [region, bosses] of Object.entries(state.bosses)) {
    const f = q ? bosses.filter(b => clean(b.name).toLowerCase().includes(q)) : bosses;
    if (q && !f.length) continue;
    const killed = f.filter(b=>b.killed).length;
    const block = document.createElement('div');
    block.className = 'region-block';
    block.innerHTML = `
      <div class="r-prog-bar"><div class="r-prog-fill" style="width:${pct(killed,f.length)}%"></div></div>
      <div class="r-hdr" onclick="togRegion(this.parentElement)">
        <div class="r-title">${region}</div>
        <div class="r-meta">${killed}/${f.length} felled &middot; ${f.reduce((s,b)=>s+(b.attempts||0),0)} deaths</div>
        <div class="r-chev">&#9660;</div>
      </div>
      <div class="r-body">
        <table class="boss-tbl">
          <thead><tr><th style="width:26px"></th><th>Boss</th><th style="width:72px;text-align:center">Deaths</th></tr></thead>
          <tbody>${f.map(b => {
            const ri = bosses.indexOf(b);
            const rk = region.replace(/'/g,"\\'");
            return `<tr class="${b.killed?'killed-row':''}">
              <td><div class="ck ${b.killed?'on':''}" onclick="togBoss('bosses','${rk}',${ri})">${b.killed?'&#10003;':''}</div></td>
              <td><div class="b-nm ${b.killed?'k':''}">${clean(b.name)}</div></td>
              <td style="text-align:center"><input class="d-inp ${(b.attempts||0)>0?'hot':''}" type="number" min="0" value="${b.attempts||0}" onchange="setDeath('bosses','${rk}',${ri},this.value)" onclick="event.stopPropagation()"></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>`;
    el.appendChild(block);
  }
}
function filterBosses(v) { renderBosses(v); }

  const el = document.getElementById('sote-body');
  el.innerHTML = '';
  for (const [region, bosses] of Object.entries(state.sote_bosses)) {
    const f = q ? bosses.filter(b => b.name.toLowerCase().includes(q)) : bosses;
    if (q && !f.length) continue;
    const killed = f.filter(b=>b.killed).length;
    const block = document.createElement('div');
    block.className = 'region-block sote';
    block.innerHTML = `
      <div class="r-prog-bar"><div class="r-prog-fill" style="width:${pct(killed,f.length)}%"></div></div>
      <div class="r-hdr" onclick="togRegion(this.parentElement)">
        <div class="r-title">${region}</div>
        <div class="r-meta" style="color:var(--sote-text2)">${killed}/${f.length} felled &middot; ${f.reduce((s,b)=>s+(b.attempts||0),0)} deaths</div>
        <div class="r-chev" style="color:var(--sote-acc)">&#9660;</div>
      </div>
      <div class="r-body">
        <table class="boss-tbl">
          <thead><tr><th style="width:26px"></th><th>Boss</th><th style="width:72px;text-align:center">Deaths</th></tr></thead>
          <tbody>${f.map(b => {
            const ri = bosses.indexOf(b);
            const rk = region.replace(/'/g,"\\'");
            return `<tr class="${b.killed?'killed-row':''}">
              <td><div class="ck ${b.killed?'on':''}" onclick="togBoss('sote_bosses','${rk}',${ri})">${b.killed?'&#10003;':''}</div></td>
              <td><div class="b-nm ${b.killed?'k':''}">${b.name}</div></td>
              <td style="text-align:center"><input class="d-inp ${(b.attempts||0)>0?'hot':''}" type="number" min="0" value="${b.attempts||0}" onchange="setDeath('sote_bosses','${rk}',${ri},this.value)" onclick="event.stopPropagation()"></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>`;
    el.appendChild(block);
  }
}
function filterSote(v) { renderSote(v); }

/* ── TOGGLE / SET ── */
function togRegion(el) { el.classList.toggle('col'); }
function togBoss(col, region, idx) {
  state[col][region][idx].killed = !state[col][region][idx].killed;
  saveState(); renderAll();
}
function setDeath(col, region, idx, val) {
  state[col][region][idx].attempts = parseInt(val)||0;
  saveState(); renderDash();
}

/* ── ITEM SECTION BUILDER (Style C) ── */
function buildItemSection(cats) {
  /* cats = [{title, items, toggleFn}] */
  return cats.map(({title, items, toggleFn}) => {
    const got = items.filter(x=>x.collected).length;
    const rows = items.map((item, i) => `
      <div class="item-row ${item.collected?'got':''}" onclick="${toggleFn}(${i})">
        <div class="ick ${item.collected?'on':''}">${item.collected?'&#10003;':''}</div>
        <div class="i-name">${item.name}${dlcBadge(item.name)}</div>
        <div class="i-loc">${item.location||item.effect||''}</div>
      </div>`).join('');
    return `
      <div class="item-section">
        <div class="cat-hdr" onclick="togCat(this.parentElement)">
          <span class="cat-title">${title}</span>
          <div class="cat-right">
            <span class="cat-cnt">${got}/${items.length}</span>
            <span class="cat-chev">&#9660;</span>
          </div>
        </div>
        <div class="cat-rows">${rows}</div>
      </div>`;
  }).join('');
}
function togCat(el) { el.classList.toggle('cat-collapsed'); }

function collapseAll(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const blocks = container.querySelectorAll('.region-block, .item-section');
  const allCollapsed = Array.from(blocks).every(b =>
    b.classList.contains('col') || b.classList.contains('cat-collapsed')
  );
  blocks.forEach(b => {
    if (b.classList.contains('region-block')) {
      allCollapsed ? b.classList.remove('col') : b.classList.add('col');
    } else {
      allCollapsed ? b.classList.remove('cat-collapsed') : b.classList.add('cat-collapsed');
    }
  });
  // Update button text
  const btn = container.closest('.tab-pane')?.querySelector('.tog-all-btn');
  if (btn) btn.textContent = allCollapsed ? 'Collapse All' : 'Expand All';
}

/* ── WEAPONS ── */
function renderWeapons(filter) {
  const q = (filter||'').toLowerCase();
  const el = document.getElementById('weapons-body');
  const cats = Object.entries(state.weapons).map(([cat, items]) => {
    const f = q ? items.filter(w => w.name.toLowerCase().includes(q) || w.location.toLowerCase().includes(q)) : items;
    return {title: cat, items: f, raw: items};
  }).filter(c => c.items.length);

  el.innerHTML = cats.map(({title, items, raw}) => {
    const got = items.filter(x=>x.collected).length;
    const rows = items.map(item => {
      const ri = raw.indexOf(item);
      return `<div class="item-row ${item.collected?'got':''}" onclick="togWeapon('${title.replace(/'/g,"\\'")}',${ri})">
        <div class="ick ${item.collected?'on':''}">${item.collected?'&#10003;':''}</div>
        <div class="i-name">${item.name}${dlcBadge(item.name)}</div>
        <div class="i-loc">${item.location||''}</div>
      </div>`;
    }).join('');
    return `<div class="item-section">
      <div class="cat-hdr" onclick="togCat(this.parentElement)">
        <span class="cat-title">${title}</span>
        <div class="cat-right"><span class="cat-cnt">${got}/${items.length}</span><span class="cat-chev">&#9660;</span></div>
      </div>
      <div class="cat-rows">${rows}</div>
    </div>`;
  }).join('');
}
function togWeapon(cat, idx) {
  state.weapons[cat][idx].collected = !state.weapons[cat][idx].collected;
  saveState(); renderWeapons(document.querySelector('#tab-weapons .search-bar')?.value||''); renderDash();
}

/* ── SPELLS ── */
function renderSpells(filter) {
  const q = (filter||'').toLowerCase();
  const el = document.getElementById('spells-body');
  const groups = [
    {title:'SORCERIES', key:'sorceries'},
    {title:'INCANTATIONS', key:'incantations'}
  ];
  el.innerHTML = groups.map(({title, key}) => {
    const items = state[key];
    const f = q ? items.filter(s => s.name.toLowerCase().includes(q)) : items;
    if (!f.length) return '';
    const got = f.filter(x=>x.collected).length;
    const rows = f.map(item => {
      const ri = items.indexOf(item);
      return `<div class="item-row ${item.collected?'got':''}" onclick="togSpell('${key}',${ri})">
        <div class="ick ${item.collected?'on':''}">${item.collected?'&#10003;':''}</div>
        <div class="i-name">${item.name}${dlcBadge(item.name)}</div>
        <div class="i-loc">${item.location||''}</div>
      </div>`;
    }).join('');
    return `<div class="item-section">
      <div class="cat-hdr" onclick="togCat(this.parentElement)">
        <span class="cat-title">${title}</span>
        <div class="cat-right"><span class="cat-cnt">${got}/${f.length}</span><span class="cat-chev">&#9660;</span></div>
      </div>
      <div class="cat-rows">${rows}</div>
    </div>`;
  }).join('');
}
function togSpell(key, idx) {
  state[key][idx].collected = !state[key][idx].collected;
  saveState(); renderSpells(document.querySelector('#tab-spells .search-bar')?.value||''); renderDash();
}

/* ── SPIRITS ── */
function renderSpirits(filter) {
  const q = (filter||'').toLowerCase();
  const items = q ? state.spirit_ashes.filter(s => s.name.toLowerCase().includes(q)) : state.spirit_ashes;
  const got = items.filter(x=>x.collected).length;
  const rows = items.map(item => {
    const ri = state.spirit_ashes.indexOf(item);
    return `<div class="item-row ${item.collected?'got':''}" onclick="togSpirit(${ri})">
      <div class="ick ${item.collected?'on':''}">${item.collected?'&#10003;':''}</div>
      <div class="i-name">${item.name}${dlcBadge(item.name)}</div>
      <div class="i-loc">${item.location||''}</div>
    </div>`;
  }).join('');
  document.getElementById('spirits-body').innerHTML = `
    <div class="item-section">
      <div class="cat-hdr" onclick="togCat(this.parentElement)">
        <span class="cat-title">SPIRIT ASHES</span>
        <div class="cat-right"><span class="cat-cnt">${got}/${items.length}</span><span class="cat-chev">&#9660;</span></div>
      </div>
      <div class="cat-rows">${rows}</div>
    </div>`;
}
function togSpirit(idx) {
  state.spirit_ashes[idx].collected = !state.spirit_ashes[idx].collected;
  saveState(); renderSpirits(); renderDash();
}

/* ── TALISMANS ── */
function renderTalismans(filter) {
  const q = (filter||'').toLowerCase();
  const items = q ? state.talismans.filter(t => t.name.toLowerCase().includes(q) || t.effect.toLowerCase().includes(q)) : state.talismans;
  const got = items.filter(x=>x.collected).length;
  const rows = items.map(item => {
    const ri = state.talismans.indexOf(item);
    return `<div class="item-row ${item.collected?'got':''}" onclick="togTalisman(${ri})">
      <div class="ick ${item.collected?'on':''}">${item.collected?'&#10003;':''}</div>
      <div class="i-name">${item.name}${dlcBadge(item.name)}</div>
      <div class="i-loc">${item.effect||''}</div>
    </div>`;
  }).join('');
  document.getElementById('talismans-body').innerHTML = `
    <div class="item-section">
      <div class="cat-hdr" onclick="togCat(this.parentElement)">
        <span class="cat-title">TALISMANS</span>
        <div class="cat-right"><span class="cat-cnt">${got}/${items.length}</span><span class="cat-chev">&#9660;</span></div>
      </div>
      <div class="cat-rows">${rows}</div>
    </div>`;
}
function togTalisman(idx) {
  state.talismans[idx].collected = !state.talismans[idx].collected;
  saveState(); renderTalismans(); renderDash();
}

/* ── CSV ── */
function exportCSV() {
  let csv = 'Section,Region,Name,DLC,Status,Deaths\n';
  for (const [r,bs] of Object.entries(state.bosses))
    for (const b of bs)
      csv += `Boss,"${r}","${clean(b.name).replace(/"/g,"'")}",No,${b.killed?'Felled':'Not Felled'},${b.attempts||0}\n`;
  for (const [r,bs] of Object.entries(state.sote_bosses))
    for (const b of bs)
      csv += `Boss SotE,"${r}","${b.name.replace(/"/g,"'")}",Yes,${b.killed?'Felled':'Not Felled'},${b.attempts||0}\n`;
  for (const [cat,ws] of Object.entries(state.weapons))
    for (const w of ws)
      csv += `Weapon,"${cat}","${w.name.replace(/"/g,"'")}",${isDLC(w.name)?'Yes':'No'},${w.collected?'Collected':'Not Collected'},\n`;
  for (const s of [...state.sorceries,...state.incantations])
    csv += `Spell,,"${s.name.replace(/"/g,"'")}",${isDLC(s.name)?'Yes':'No'},${s.collected?'Collected':'Not Collected'},\n`;
  for (const s of state.spirit_ashes)
    csv += `Spirit Ash,,"${s.name.replace(/"/g,"'")}",${isDLC(s.name)?'Yes':'No'},${s.collected?'Collected':'Not Collected'},\n`;
  for (const t of state.talismans)
    csv += `Talisman,,"${t.name.replace(/"/g,"'")}",${isDLC(t.name)?'Yes':'No'},${t.collected?'Collected':'Not Collected'},\n`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `er_${currentChar.replace(/\W/g,'_')}_${currentJourney.replace('+','p')}.csv`;
  a.click();
}

/* ── RENDER ALL ── */
function renderAll() {
  renderDash();
  renderBosses(document.getElementById('boss-search')?.value||'');
  renderSote();
  renderWeapons();
  renderSpells();
  renderSpirits();
  renderTalismans();
}

/* ── INIT ── */
loadMeta();
state = loadState() || freshState();
buildSelectors();

const savedTheme = localStorage.getItem('er_theme') || 'stars';
if (savedTheme !== 'stars') {
  document.body.className = savedTheme === 'elden' ? 't-elden' : 't-sote';
  document.querySelectorAll('.t-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.t === savedTheme);
  });
}

function adjustLayout() {
  const topbar = document.getElementById('topbar');
  const subnav = document.getElementById('subnav');
  const shell = document.getElementById('shell');
  const topH = topbar.getBoundingClientRect().height;
  const navH = subnav.getBoundingClientRect().height;
  subnav.style.top = topH + 'px';
  shell.style.paddingTop = (topH + navH) + 'px';
}

window.addEventListener('resize', adjustLayout);
renderAll();
// Run after fonts/layout settle
requestAnimationFrame(() => { adjustLayout(); setTimeout(adjustLayout, 200); });
</script>
